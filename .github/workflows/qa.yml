name: QA - Orchestrator

on:
  push:
    branches: [main, master, 'release/*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      plugin_repo:
        description: 'NotificationX Plugin Repository URL'
        required: false
        default: 'WPDevelopers/notificationx'
      plugin_branch:
        description: 'Plugin Branch to Test'
        required: false
        default: 'master'

jobs:
  # 1. Run Syntax and Version checks (Parallel)
  verify-syntax:
    name: Verify Syntax
    uses: ./.github/workflows/php-syntax-check.yml
    with:
      plugin_repo: ${{ github.event.inputs.plugin_repo || 'WPDevelopers/notificationx' }}
      plugin_branch: ${{ github.event.inputs.plugin_branch || 'master' }}

  verify-version:
    name: Verify Version
    uses: ./.github/workflows/plugin-version-verification.yml
    with:
      plugin_repo: ${{ github.event.inputs.plugin_repo || 'WPDevelopers/notificationx' }}
      plugin_branch: ${{ github.event.inputs.plugin_branch || 'master' }}

  # 2. Run Compatibility and PCP tests (Parallel)
  compatibility-test:
    name: Compatibility Test
    uses: ./.github/workflows/notificationx-compatibility-test.yml
    with:
      plugin_repo: ${{ github.event.inputs.plugin_repo || 'WPDevelopers/notificationx' }}
      plugin_branch: ${{ github.event.inputs.plugin_branch || 'master' }}

  pcp-check:
    name: PCP Check
    uses: ./.github/workflows/pcp-plugin-check.yml
    with:
      plugin_repo: ${{ github.event.inputs.plugin_repo || 'WPDevelopers/notificationx' }}
      plugin_branch: ${{ github.event.inputs.plugin_branch || 'master' }}
