name: QA - Orchestrator

on:
  push:
    branches: [main, master, 'release/*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      plugin_branch:
        description: 'Plugin Branch to Test'
        required: false
        default: 'master'

jobs:
  # 1. Build the plugin archive
  build:
    name: Build Plugin
    uses: ./.github/workflows/create-plugin-zip.yml
    with:
      ref: ${{ github.event.inputs.plugin_branch || github.ref }}
    # create-plugin-zip.yml outputs artifact-name

  # 2. Run Syntax and Version checks (Parallel)
  verify-syntax:
    name: Verify Syntax
    needs: build
    uses: ./.github/workflows/php-syntax-check.yml
    with:
      artifact-name: ${{ needs.build.outputs.artifact-name }}

  verify-version:
    name: Verify Version
    needs: build
    uses: ./.github/workflows/plugin-version-verification.yml
    with:
      artifact-name: ${{ needs.build.outputs.artifact-name }}

  # 3. Run Compatibility and PCP tests (Parallel)
  compatibility-test:
    name: Compatibility Test
    needs: build
    uses: ./.github/workflows/notificationx-compatibility-test.yml
    with:
      artifact-name: ${{ needs.build.outputs.artifact-name }}

  pcp-check:
    name: PCP Check
    needs: build
    uses: ./.github/workflows/pcp-plugin-check.yml
    with:
      artifact-name: ${{ needs.build.outputs.artifact-name }}
