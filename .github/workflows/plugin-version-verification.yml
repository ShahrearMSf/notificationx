name: Plugin Version Verification

on:
  workflow_call:
    inputs:
      plugin_repo:
        required: false
        type: string
        default: 'WPDevelopers/notificationx'
      plugin_branch:
        required: false
        type: string
        default: 'master'

jobs:
  verify-version:
    name: Verify Plugin Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout NotificationX plugin
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.plugin_repo }}
          ref: ${{ inputs.plugin_branch }}
          path: notificationx

      - name: Run Version Check
        run: |
          echo "🔍 Checking version consistency..."
          
          # Sanitize outputs (remove any hidden \r or whitespace)
          PACKAGE_VERSION=$(cat notificationx/package.json | grep '"version":' | head -1 | awk -F '"' '{print $4}' | tr -d '[:space:]')
          PLUGIN_INFO_VERSION=$(grep 'Version:' notificationx/notificationx.php | head -1 | awk '{print $NF}' | tr -d '[:space:]')
          CONSTANT_VERSION=$(grep "define( 'NOTIFICATIONX_VERSION'" notificationx/notificationx.php | head -1 | awk -F "'" '{print $4}' | tr -d '[:space:]')
          README_VERSION=$(grep -i "Stable tag:" notificationx/README.txt | head -1 | awk '{print $NF}' | tr -d '[:space:]')
          
          echo "package.json: $PACKAGE_VERSION"
          echo "notificationx.php (Info): $PLUGIN_INFO_VERSION"
          echo "notificationx.php (Constant): $CONSTANT_VERSION"
          echo "README.txt: $README_VERSION"
          
          # Check if they match
          if [ "$PACKAGE_VERSION" != "$PLUGIN_INFO_VERSION" ] || [ "$PLUGIN_INFO_VERSION" != "$CONSTANT_VERSION" ] || [ "$CONSTANT_VERSION" != "$README_VERSION" ]; then
            echo "❌ Version mismatch detected!"
            exit 1
          fi
          echo "✅ All versions match: $CONSTANT_VERSION"
