name: PHP Syntax Check

on:
  workflow_call:
    inputs:
      plugin_repo:
        required: false
        type: string
        default: 'WPDevelopers/notificationx'
      plugin_branch:
        required: false
        type: string
        default: 'master'

jobs:
  syntax-check:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout NotificationX plugin
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.plugin_repo }}
          ref: ${{ inputs.plugin_branch }}
          path: notificationx

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4' # Syntax check can run on 7.4 to ensure compatibility
          tools: composer, wp-cli

      - name: Run Syntax Check
        run: |
          echo "🔍 Checking PHP syntax for all plugin files..."
          find notificationx -name "*.php" -exec php -l {} \; | grep "Errors parsing" && exit 1 || echo "✅ No syntax errors found"
